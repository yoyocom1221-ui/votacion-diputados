<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ver votos - Aprobación de proyectos</title>
<style>
body{font-family: Arial; text-align:center; background:#f4f4f4; margin:0; padding:0;}
nav{background:#002D62; padding:15px;}
nav a{color:white; margin:10px; text-decoration:none; font-weight:bold;}
button{padding:10px 20px; margin:5px; font-size:16px; cursor:pointer;}
.provincia{background:white; margin:10px; padding:10px; border-radius:8px;}
</style>
</head>
<body>

<nav>
<a href="index.html">Inicio</a>
<a href="votacion.html">Votación</a>
<a href="ver_votos.html">Ver votos</a>
</nav>

<h2>Resultados</h2>
<button onclick="mostrarResultados()">Actualizar resultados</button>
<button onclick="borrarResultados()">Borrar resultados</button>
<div id="verResultados"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAcsuZ-oZCrQ81XNF-945h4d2msKtBN8uM",
  authDomain: "votacion-diputados.firebaseapp.com",
  databaseURL: "https://votacion-diputados-default-rtdb.firebaseio.com",
  projectId: "votacion-diputados",
  storageBucket: "votacion-diputados.firebasestorage.app",
  messagingSenderId: "56652176884",
  appId: "1:56652176884:web:2a50622dea3dc814a72da1",
  measurementId: "G-0ZWXEEG719"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user)=>{
  if(!user){alert("Debes iniciar sesión primero."); window.location="index.html";}
});

const provincias = ["La Vega","Puerto Plata","San Cristóbal","San Juan","Santiago","Santo Domingo Este"];
const cont = document.getElementById("verResultados");

window.mostrarResultados = function(){
  cont.innerHTML="";
  provincias.forEach(p=>{
    const votoRef = ref(db,'votos/'+p);
    onValue(votoRef,(snapshot)=>{
      let datos = snapshot.val() || {si:0,no:0};
      let div = document.getElementById("res_"+p);
      if(!div){
        div=document.createElement("div");
        div.id="res_"+p;
        div.className="provincia";
        cont.appendChild(div);
      }
      div.innerHTML=`
        <h3>${p}</h3>
        <p>SI: ${datos.si}</p>
        <p>NO: ${datos.no}</p>
      `;
    });
  });
};

window.borrarResultados = function(){
  if(confirm("¿Seguro que quieres borrar todos los votos?")){
    remove(ref(db,"votos"));
    alert("Todos los votos fueron borrados");
  }
};
</script>

</body>
</html>
