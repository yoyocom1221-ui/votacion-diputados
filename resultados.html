<!DOCTYPE html>
<html lang="es">

<style>
body{

<body>

<nav>

<a href="resultados.html">Ver votos</a>
</nav>

<h2>Resultados de la votación</h2>

<button onclick="cargarResultados()">Actualizar resultados</button>

<div id="resultados"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAcsuZ-oZCrQ81XNF-945h4d2msKtBN8uM",
authDomain: "votacion-diputados.firebaseapp.com",
databaseURL: "https://votacion-diputados-default-rtdb.firebaseio.com",
projectId: "votacion-diputados",
storageBucket: "votacion-diputados.appspot.com",
messagingSenderId: "56652176884",
appId: "1:56652176884:web:2a50622dea3dc814a72da1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.cargarResultados = async function(){

const cont = document.getElementById("resultados");
cont.innerHTML="Cargando...";

const votosRef = ref(db,'votos');

const snapshot = await get(votosRef);

cont.innerHTML="";

if(!snapshot.exists()){
cont.innerHTML="No hay votos registrados.";
return;
}

const datos = snapshot.val();

for(const provincia in datos){

const si = datos[provincia].si || 0;
const no = datos[provincia].no || 0;

const div = document.createElement("div");
div.className="provincia";

div.innerHTML=`
<h3>${provincia}</h3>
<p>SI: ${si}</p>
<p>NO: ${no}</p>
`;

cont.appendChild(div);

}

}

</script>

</body>
</html>
