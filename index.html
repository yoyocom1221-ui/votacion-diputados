<!DOCTYPE html>
<html>
<head>
<title>Aprobación de proyectos</title>
<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#002D62;
color:white;
padding:20px;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
cursor:pointer;
border-radius:6px;
border:none;
}

.si{
background:green;
color:white;
}

.no{
background:red;
color:white;
}

.provincia{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
}

</style>
</head>

<body>

<header>
<h1>Aprobación de proyectos</h1>
<h3>Sistema de votación</h3>
</header>

<h2>Provincias de República Dominicana</h2>

<div id="provincias"></div>

<h2>Resultados</h2>
<div id="resultados"></div>

<script>

const provincias=[
"Azua","Baoruco","Barahona","Dajabón","Distrito Nacional","Duarte",
"Elías Piña","El Seibo","Espaillat","Hato Mayor","Hermanas Mirabal",
"Independencia","La Altagracia","La Romana","La Vega","María Trinidad Sánchez",
"Monseñor Nouel","Monte Cristi","Monte Plata","Pedernales","Peravia",
"Puerto Plata","Samaná","San Cristóbal","San José de Ocoa","San Juan",
"San Pedro de Macorís","Sánchez Ramírez","Santiago","Santiago Rodríguez",
"Santo Domingo","Valverde"
];

let votos={};

provincias.forEach(p=>{
votos[p]={si:0,no:0};
});

function cargarProvincias(){

let cont=document.getElementById("provincias");

provincias.forEach(p=>{

let div=document.createElement("div");
div.className="provincia";

div.innerHTML=`
<h3>${p}</h3>
<button class="si" onclick="votar('${p}','si')">SI</button>
<button class="no" onclick="votar('${p}','no')">NO</button>
`;

cont.appendChild(div);

});

}

function votar(prov,tipo){

votos[prov][tipo]++;

mostrarResultados();

}

function mostrarResultados(){

let cont=document.getElementById("resultados");
cont.innerHTML="";

provincias.forEach(p=>{

let div=document.createElement("div");
div.className="provincia";

div.innerHTML=`
<h3>${p}</h3>
SI: ${votos[p].si} <br>
NO: ${votos[p].no}
`;

cont.appendChild(div);

});

}

cargarProvincias();

</script>

</body>
</html>
