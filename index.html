<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aprobación de proyectos</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

nav{
background:#002D62;
padding:15px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

section{
margin:30px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

.provincia{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}

img{
width:300px;
margin:10px;
border-radius:10px;
}

</style>
</head>

<body>

<nav>
<a href="#inicio">Inicio</a>
<a href="#provincias">Provincias</a>
<a href="#resultados">Ver votos</a>
</nav>

<section id="inicio">

<h1>Aprobación de proyectos</h1>
<h2>Sistema de votación</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/Camara_de_Diputados_RD.jpg">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Flag_of_the_Dominican_Republic.svg">

<p>Votación por provincias de la República Dominicana</p>

</section>

<section id="provincias">

<h2>Provincias de República Dominicana</h2>

<div id="listaProvincias"></div>

</section>

<section id="resultados">

<h2>Resultados</h2>

<button onclick="mostrarResultados()">Actualizar resultados</button>
<button onclick="borrarResultados()">Borrar resultados</button>

<div id="verResultados"></div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  window.borrarResultados = function(){

if(confirm("¿Seguro que quieres borrar todos los votos?")){

const votosRef = ref(db,"votos");

remove(votosRef);

alert("Todos los votos fueron borrados");

}

}

const firebaseConfig = {
apiKey: "AIzaSyAcsuZ-oZCrQ81XNF-945h4d2msKtBN8uM",
authDomain: "votacion-diputados.firebaseapp.com",
databaseURL: "https://votacion-diputados-default-rtdb.firebaseio.com",
projectId: "votacion-diputados",
storageBucket: "votacion-diputados.firebasestorage.app",
messagingSenderId: "56652176884",
appId: "1:56652176884:web:2a50622dea3dc814a72da1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const provincias = [
"Azua","Baoruco","Barahona","Dajabón","Distrito Nacional","Duarte",
"Elías Piña","El Seibo","Espaillat","Hato Mayor","Hermanas Mirabal",
"Independencia","La Altagracia","La Romana","La Vega","María Trinidad Sánchez",
"Monseñor Nouel","Monte Cristi","Monte Plata","Pedernales","Peravia",
"Puerto Plata","Samaná","San Cristóbal","San José de Ocoa","San Juan",
"San Pedro de Macorís","Sánchez Ramírez","Santiago","Santiago Rodríguez",
"Valverde"
];

const cont = document.getElementById("listaProvincias");

provincias.forEach(p=>{

const div=document.createElement("div");

div.className="provincia";

div.innerHTML=`
<h3>${p}</h3>
<button onclick="votar('${p}','si')">SI</button>
<button onclick="votar('${p}','no')">NO</button>
`;

cont.appendChild(div);

});

window.votar = async function(provincia, opcion){

const votoRef = ref(db, 'votos/' + provincia);

const snapshot = await get(votoRef);

let datos = {si:0,no:0};

if(snapshot.exists()){
datos = snapshot.val();
}

datos[opcion]++;

set(votoRef, datos);

alert("Voto registrado");

}

window.mostrarResultados = function(){

const cont = document.getElementById("verResultados");

cont.innerHTML="";

provincias.forEach(p=>{

const votoRef = ref(db,'votos/'+p);

onValue(votoRef,(snapshot)=>{

let datos = snapshot.val() || {si:0,no:0};

let div = document.getElementById("res_"+p);

if(!div){

div=document.createElement("div");

div.id="res_"+p;

div.className="provincia";

cont.appendChild(div);

}

div.innerHTML=`
<h3>${p}</h3>
<p>SI: ${datos.si}</p>
<p>NO: ${datos.no}</p>
`;

});

});

}

</script>

</body>
</html>
