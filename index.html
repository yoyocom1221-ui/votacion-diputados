<!DOCTYPE html>
<html>
<head>
<title>Aprobación de proyectos</title>
<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#002D62;
color:white;
padding:20px;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
cursor:pointer;
border-radius:6px;
border:none;
}

.si{
background:green;
color:white;
}

.no{
background:red;
color:white;
}

.provincia{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
}

</style>
</head>

<body>

  <nav>
  <a href="#inicio">Inicio</a> |
  <a href="#provincias">Provincias de República Dominicana</a> |
  <a href="#resultados">Resultados</a>
</nav>

<section id="inicio">
  <h1>Aprobación de proyectos</h1>
  <p>Sistema de votación</p>
</section>

<section id="provincias">
  <h2>Provincias</h2>

  <button onclick="votar('Santo Domingo','si')">Santo Domingo - SI</button>
  <button onclick="votar('Santo Domingo','no')">Santo Domingo - NO</button>

  <button onclick="votar('Santiago','si')">Santiago - SI</button>
  <button onclick="votar('Santiago','no')">Santiago - NO</button>

</section>

<section id="resultados">
  <h2>Resultados</h2>
  <button onclick="mostrarResultados()">Ver votos</button>
  <div id="verResultados"></div>
</section>
  
<header>
<h1>Aprobación de proyectos</h1>
<h3>Sistema de votación</h3>
</header>

<h2>Provincias de República Dominicana</h2>

<div id="provincias"></div>

<h2>Resultados</h2>
<div id="resultados"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcsuZ-oZCrQ81XNF-945h4d2msKtBN8uM",
  authDomain: "votacion-diputados.firebaseapp.com",
  databaseURL: "https://votacion-diputados-default-rtdb.firebaseio.com",
  projectId: "votacion-diputados",
  storageBucket: "votacion-diputados.firebasestorage.app",
  messagingSenderId: "56652176884",
  appId: "1:56652176884:web:2a50622dea3dc814a72da1",
  measurementId: "G-0ZWXEEG719"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const provincias = [
"Azua","Baoruco","Barahona","Dajabón","Distrito Nacional","Duarte",
"Elías Piña","El Seibo","Espaillat","Hato Mayor","Hermanas Mirabal",
"Independencia","La Altagracia","La Romana","La Vega","María Trinidad Sánchez",
"Monseñor Nouel","Monte Cristi","Monte Plata","Pedernales","Peravia",
"Puerto Plata","Samaná","San Cristóbal","San José de Ocoa","San Juan",
"San Pedro de Macorís","Sánchez Ramírez","Santiago","Santiago Rodríguez",
"Valverde"
];

window.votar = async function(provincia, opcion){

const votoRef = ref(db, 'votos/' + provincia);

const snapshot = await get(votoRef);

let datos = {si:0,no:0};

if(snapshot.exists()){
datos = snapshot.val();
}

datos[opcion]++;

set(votoRef, datos);

alert("Voto registrado");

}

window.mostrarResultados = function(){

const cont = document.getElementById("verResultados");

cont.innerHTML="";

provincias.forEach(p=>{

const votoRef = ref(db,'votos/'+p);

onValue(votoRef,(snapshot)=>{

let datos = snapshot.val() || {si:0,no:0};

let div = document.getElementById("res_"+p);

if(!div){

div=document.createElement("div");

div.id="res_"+p;

div.className="provincia";

cont.appendChild(div);

}

div.innerHTML = `
<h3>${p}</h3>
<p>SI: ${datos.si}</p>
<p>NO: ${datos.no}</p>
`;

});

});

}

</script>
